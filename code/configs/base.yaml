run:
  name: "first-draft"
  notes: "v1 yes/no classifier via Ollama (Gemma 4 E4B) on HC3 subset"

model:
  # Default: Gemma 4 E4B (edge variant, ~4B effective params — fast iteration).
  # Alt: "gemma4:31b" — 31B Dense, smartest Gemma 4. Use once the pipeline is validated.
  name: "gemma4:e4b"
  host: "http://localhost:11434"

data:
  split: "all"
  sample_size: 100
  seed: 42

classification:
  num_predict: 16
  temperature: 0.0
  max_retries: 3
  think: false  # Gemma 4 is a thinking model — disable for single-token classification
  # Runtime efficiency knobs — see docs/ollama-config.md for rationale.
  # keep_alive keeps the model resident across run pauses (eliminates the 5-min
  # unload sawtooth). Does NOT affect model output; safe to leave on by default.
  keep_alive: "1h"
  # Optional; opt in after verifying your longest passage fits. Lower num_ctx
  # shrinks the KV-cache allocation dramatically (Gemma 4 default is 32k). For
  # HC3 single-token classification, 2048 is comfortable headroom.
  # num_ctx: 2048
  # Ollama default is 512. Raising to 1024 speeds prefill on long prompts if
  # memory permits; identical logprobs either way.
  # num_batch: 512
