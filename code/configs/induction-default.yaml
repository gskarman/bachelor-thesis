run:
  name: "induction-default"
  notes: "Thread B full run: n=200 scoring + pool=20 seed on the 60/20/20 HC3 train split, 30-iter budget, plateau Δ<0.005 × 3. Gemma 4 E4B. Winner frozen for Thread A calibration (D6)."

model:
  name: "gemma4:e4b"
  host: "http://localhost:11434"

data:
  split: "all"
  seed: 42
  min_chars: 32

splits:
  train: 0.60
  val: 0.20
  test: 0.20
  seed: 42

seed:
  pool_size: 20

induction:
  max_iters: 30
  plateau_threshold: 0.005
  plateau_window: 3
  misclassified_k: 20
  scoring_sample: 200

classification:
  num_predict: 16
  temperature: 0.0
  max_retries: 3
