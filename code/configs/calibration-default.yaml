run:
  name: "calibration-default"
  notes: "D6 calibration over Thread B's frozen best policy — full splits from make_splits(seed=42, HC3 all)"

model:
  # Primary: 31B for the headline number. If 31B turns out too slow on val+test
  # (800 calls on 60/20/20 with n=full HC3 would be large), flip this to e4b and
  # note the swap in RUNS.md.
  name: "gemma4:31b"
  host: "http://localhost:11434"

policy:
  # TBD — point to the winning policy file from Thread B's full n=200 induction once
  # that PR lands (logs/policies/<run_id>.md). Until then, use calibration-smoke.yaml.
  path: "logs/policies/TODO-B-frozen-policy.md"

splits:
  split: "all"
  sample_size: null   # full HC3 all
  seed: 42
  min_chars: 32
  train: 0.60
  val: 0.20
  test: 0.20

classification:
  num_predict: 1
  temperature: 0.0
  max_retries: 3
  think: false
  top_logprobs_k: 25   # enough for both Yes and No to survive even on 31B's near-deterministic distributions
